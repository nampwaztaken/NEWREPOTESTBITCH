            font-family: Inter, sans-serif;
          }

          body {
            display: grid;
            place-items: center;
            background: linear-gradient(180deg,#f4efe7,#efe8dd,#e9e1d2);
          }

          #app {
            display: none;
            text-align: center;
            padding: 2rem;
          }

          #launcher {
            text-align: center;
          }

          button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
